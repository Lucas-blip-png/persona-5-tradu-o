name: Build installer (.exe)

# Gera o instalador grafico (.exe) no Windows.
# - Em push de tag v*: compila e PUBLICA um Release com o .exe.
# - Manualmente (workflow_dispatch): compila e sobe como artefato.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar PyInstaller
        run: pip install pyinstaller
      - name: Empacotar instalador
        run: >
          pyinstaller --onefile --windowed
          --name P5R-PTBR-Installer
          --add-data "mod;mod"
          --paths installer
          installer/run_installer.py
      - name: Subir artefato
        uses: actions/upload-artifact@v4
        with:
          name: P5R-PTBR-Installer
          path: dist/P5R-PTBR-Installer.exe
      - name: Publicar Release (em tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/P5R-PTBR-Installer.exe
          name: Tradução PT-BR ${{ github.ref_name }}
          body: |
            Instalador da tradução PT-BR de Persona 5 Royal (PC).

            **Jogador:** baixe `P5R-PTBR-Installer.exe`, abra e confirme. Veja o COMECE-AQUI.md.

            Projeto de fã, não-oficial. Você precisa ter o jogo legalmente.
